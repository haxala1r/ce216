name: Package Windows Installer

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  package:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build fat jar
        run: mvn package

      - name: Create Windows installer
        run: |
          jpackage --type exe `
            --input target `
            --name "Sports Manager" `
            --app-version 1.0.0 `
            --main-jar sports-manager-1.0.0.jar `
            --main-class com.lambda.sports.Main `
            --win-dir-chooser `
            --win-menu `
            --win-shortcut

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: sports-manager-windows
          path: "*.exe"
